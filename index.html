<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>riderAI</title>
  <meta name="description" content="riderAI — coming soon.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --teal:       #007A6E;
      --teal-light: #00BEA8;
      --black:      #080808;
      --off-white:  #EDE8DE;
      --sand:       #C8BA9E;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--black);
      color: var(--off-white);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* ─── Main centered content ─── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
      gap: 2.5rem;
    }

    /* ─── Logo ─── */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      text-decoration: none;
    }

    .logo-svg { width: 42px; height: 42px; flex-shrink: 0; }

    .logo-wordmark {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--off-white);
      letter-spacing: -0.03em;
    }
    .logo-wordmark .ai { color: var(--teal-light); }

    /* ─── Divider ─── */
    .divider {
      width: 1px;
      height: 40px;
      background: rgba(200, 186, 158, 0.2);
    }

    /* ─── Tagline ─── */
    .tagline {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sand);
    }

    /* ─── Contact ─── */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .contact-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal-light);
    }

    .contact-email {
      color: var(--off-white);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border-bottom: 1px solid rgba(0, 190, 168, 0.35);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact-email:hover {
      color: var(--teal-light);
      border-color: var(--teal-light);
    }

    /* ─── Footer ─── */
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.57rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(200, 186, 158, 0.25);
    }
  </style>
</head>
<body>

  <main>

    <a href="/" class="logo" aria-label="riderAI">
      <!-- Logomark: teal rounded square with stylised R, per brand guidelines -->
      <svg class="logo-svg" viewBox="0 0 42 42" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="42" height="42" rx="9" fill="#007A6E"/>
        <!-- Stem -->
        <line x1="13" y1="11" x2="13" y2="31"
              stroke="white" stroke-width="3" stroke-linecap="round"/>
        <!-- Bowl -->
        <path d="M13 11 L22 11 Q28 11 28 17 Q28 23 22 23 L13 23"
              stroke="white" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" fill="none"/>
        <!-- Angled leg -->
        <line x1="21" y1="23" x2="29" y2="31"
              stroke="white" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="logo-wordmark">rider<span class="ai">AI</span></span>
    </a>

    <div class="divider" aria-hidden="true"></div>

    <p class="tagline">Built to protect the world's riders.</p>

    <div class="contact">
      <p class="contact-label">Get in touch</p>
      <a href="mailto:info@therider.ai" class="contact-email">info@therider.ai</a>
    </div>

  </main>

  <footer>
    <span>© 2026 RiderAI, Inc.</span>
  </footer>

</body>
</html>
