<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>riderAI</title>
  <meta name="description" content="The intelligence layer for the world's 1.2 billion two-wheelers.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #0A0A0A;
      --text:        #C2BDB5;   /* warm off-white — comfortable on dark */
      --text-muted:  #5C5955;   /* for labels and secondary elements */
      --teal:        #0d6a5a;   /* exact brand teal from logo */
      --teal-hover:  #117a68;
      --border:      rgba(194, 189, 181, 0.12);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* ─── Centered card ─── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 2rem;
    }

    /* ─── Logo ─── */
    /* Using the real logo extracted from brand guidelines.
       The pill background is near-black, blending with our page bg. */
    .logo img {
      height: 44px;
      width: auto;
    }

    /* ─── Tagline ─── */
    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.6;
      max-width: 480px;
    }

    /* ─── Divider ─── */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
    }

    /* ─── Contact ─── */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .contact-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .contact-email {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-email:hover {
      color: #fff;
    }

    /* ─── Footer ─── */
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <main>
    <a href="/" class="logo" aria-label="riderAI">
      <img src="logo.png" alt="riderAI" height="44">
    </a>

    <p class="tagline">
      The intelligence layer for the world's 1.2 billion two-wheelers.
    </p>

    <div class="divider" aria-hidden="true"></div>

    <div class="contact">
      <p class="contact-label">Get in touch</p>
      <a href="mailto:info@therider.ai" class="contact-email">info@therider.ai</a>
    </div>
  </main>

  <footer>
    © 2026 RiderAI, Inc.
  </footer>

</body>
</html>
