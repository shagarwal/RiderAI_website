<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>riderAI</title>
  <meta name="description" content="The intelligence layer for the world's 1.2 billion two-wheelers.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #0A0A0A;
      --text:        #C2BDB5;   /* warm off-white — comfortable on dark */
      --text-muted:  #5C5955;   /* for labels and secondary elements */
      --teal:        #0d6a5a;   /* exact brand teal from logo */
      --teal-hover:  #117a68;
      --border:      rgba(194, 189, 181, 0.12);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* ─── Centered card ─── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 2rem;
    }

    /* ─── Logo ─── */
    .logo img {
      height: 56px;
      width: auto;
    }

    /* ─── Tagline ─── */
    .tagline {
      font-size: clamp(0.95rem, 1.8vw, 1.15rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.6;
      max-width: 700px;   /* wide enough to stay one line on desktop */
      white-space: nowrap; /* force single line on desktop */
    }

    @media (max-width: 700px) {
      .tagline { white-space: normal; } /* allow wrap on mobile */
    }

    /* ─── Divider ─── */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
    }

    /* ─── Contact ─── */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .contact-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .contact-email {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-email:hover {
      color: #fff;
    }

    /* ─── Copy button ─── */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem;
      color: var(--text-muted);
      opacity: 0.55;
      display: flex;
      align-items: center;
      transition: opacity 0.2s, color 0.2s;
      position: relative;
    }

    .copy-btn:hover {
      opacity: 0.9;
      color: var(--text);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Tooltip shown on copy */
    .copy-btn::after {
      content: "Copied!";
      position: absolute;
      top: -1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.12);
      color: var(--text);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .copy-btn.copied::after {
      opacity: 1;
    }

    /* ─── Footer ─── */
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <main>
    <a href="/" class="logo" aria-label="riderAI">
      <img src="logo.png" alt="riderAI" height="44">
    </a>

    <p class="tagline">
      The intelligence layer for the world's 1.2 billion two-wheelers.
    </p>

    <div class="divider" aria-hidden="true"></div>

    <div class="contact">
      <p class="contact-label">Get in touch</p>
      <div class="contact-row">
        <a href="mailto:info@therider.ai" class="contact-email">info@therider.ai</a>
        <button class="copy-btn" aria-label="Copy email address" onclick="
          navigator.clipboard.writeText('info@therider.ai').then(() => {
            this.classList.add('copied');
            setTimeout(() => this.classList.remove('copied'), 1500);
          });
        ">
          <!-- Two-pages copy icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="11" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <footer>
    © 2026 RiderAI, Inc.
  </footer>

</body>
</html>
